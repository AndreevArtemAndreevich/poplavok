<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Поплавок — ИИ-сторож поклёвки</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#050F15">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Поплавок">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050F15;
  --ink:#EAF2F3;
  --dim:#7FA0A8;
  --accent:#FF5A1F;
  --accent2:#FF7A3D;
  --teal:#2FA8A0;
  --alert:#FF3B3B;
  --glass:rgba(8,21,28,.55);
  --glass2:rgba(8,21,28,.8);
  --stroke:rgba(255,255,255,.09);
  --glow:rgba(255,90,31,.35);
}
body.night{
  --ink:#ffd9cd;
  --dim:#b07260;
  --accent:#ff4e2a;
  --teal:#cc5540;
  --glass:rgba(24,8,5,.6);
  --glass2:rgba(24,8,5,.85);
  --stroke:rgba(255,120,80,.14);
  --glow:rgba(255,60,30,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:radial-gradient(130% 90% at 50% 0%,#0E2833 0%,#081821 55%,#040B10 100%);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  overflow:hidden;user-select:none;
}
body.night{background:radial-gradient(130% 90% at 50% 0%,#200d08 0%,#140806 55%,#0a0403 100%)}

#app{position:fixed;inset:0}
#stage{position:absolute;inset:0}
#video,#simCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;inset:0;width:100%;height:100%}
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;
  box-shadow:inset 0 0 140px 40px rgba(255,59,59,.6);z-index:5}
#flash.show{opacity:1}

/* ================= верхняя панель ================= */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 18px 26px;
  background:linear-gradient(180deg,rgba(4,11,16,.8) 0%,rgba(4,11,16,.35) 60%,transparent 100%);
  pointer-events:none;
}
.brand{font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:2.5px;
  display:flex;align-items:center;gap:8px;color:var(--ink);opacity:.95}
.brand .bob{display:inline-block;width:7px;height:18px;border-radius:4px;
  background:linear-gradient(180deg,var(--accent) 0 40%,#fff 40% 55%,#C0262D 55% 100%);
  box-shadow:0 0 10px var(--glow);
  animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(3px) rotate(2deg)}}
.status-pill{
  font-size:11px;font-weight:600;letter-spacing:.4px;padding:6px 13px;border-radius:99px;
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--stroke);color:var(--dim);transition:all .3s;
}
.status-pill.watching{color:var(--teal);border-color:rgba(47,168,160,.4)}
.status-pill.bite{color:#fff;background:var(--alert);border-color:var(--alert);
  box-shadow:0 0 20px rgba(255,59,59,.6);animation:pulse .5s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}

/* фонарик — плавающая кнопка справа */
#torchBtn{position:absolute;right:14px;top:calc(74px + env(safe-area-inset-top));z-index:11;display:none}

/* ================= экран-приветствие ================= */
#welcome{
  position:absolute;inset:0;z-index:15;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;text-align:center;padding:0 34px;
  background:radial-gradient(130% 90% at 50% 0%,#0E2833 0%,#081821 55%,#040B10 100%);
  transition:opacity .35s;
}
body.night #welcome{background:radial-gradient(130% 90% at 50% 0%,#200d08 0%,#140806 55%,#0a0403 100%)}
#welcome.hide{opacity:0;pointer-events:none}
#welcome .float-big{width:14px;height:42px;border-radius:7px;position:relative;
  background:linear-gradient(180deg,var(--accent) 0 40%,#fff 40% 55%,#C0262D 55% 100%);
  box-shadow:0 0 34px var(--glow);
  animation:bob 2.6s ease-in-out infinite}
#welcome .ripple{width:64px;height:13px;margin-top:-3px;border-radius:50%;
  border:2px solid rgba(47,168,160,.4);animation:rip 2.6s ease-out infinite}
@keyframes rip{0%{transform:scale(.35);opacity:.9}100%{transform:scale(1.7);opacity:0}}
#welcome h1{font-family:'Russo One',sans-serif;font-size:24px;letter-spacing:3px;margin-top:14px;
  text-shadow:0 0 34px var(--glow)}
#welcomeMsg{color:var(--dim);font-size:13.5px;line-height:1.65;margin-top:6px;max-width:320px}
#welcomeMsg b{color:var(--ink);font-weight:600}
#btnStartCam{
  margin-top:26px;width:min(300px,80vw);padding:16px;border:none;border-radius:18px;
  font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:1px;color:#fff;cursor:pointer;
  background:linear-gradient(145deg,var(--accent2),#FF4E11);
  box-shadow:0 10px 34px var(--glow),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .15s;
}
#btnStartCam:active{transform:scale(.97)}
#btnDemoWelcome{
  margin-top:12px;background:none;border:none;color:var(--dim);font-size:13px;
  font-family:'Inter',sans-serif;cursor:pointer;text-decoration:underline;text-underline-offset:4px;
}

/* ================= нижний блок ================= */
#bottom{
  position:absolute;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;gap:12px;
  padding:26px 14px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(4,11,16,.85) 0%,rgba(4,11,16,.4) 65%,transparent 100%);
}

/* сейсмограф-карточка */
#tracecard{
  border-radius:18px;padding:9px 14px 5px;
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--stroke);
}
#trace-head{display:flex;justify-content:space-between;align-items:baseline;
  font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim)}
#trace-stats{letter-spacing:.5px;text-transform:none;font-size:11px;font-weight:600;color:var(--ink)}
#trace-stats b{color:var(--accent);font-weight:700}
#trace{width:100%;height:48px;display:block}

/* док с кнопками */
#dock{display:flex;align-items:center;justify-content:space-between;padding:0 10px}
.ibtn{
  width:50px;height:50px;border-radius:50%;border:1px solid var(--stroke);
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:var(--dim);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.ibtn:active{transform:scale(.92)}
.ibtn.on{color:var(--accent);border-color:rgba(255,90,31,.45);box-shadow:0 0 16px var(--glow)}
.ibtn svg{width:22px;height:22px}
#btnMain{
  width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;
  background:linear-gradient(145deg,var(--accent2),#FF4E11);
  box-shadow:0 8px 30px var(--glow),inset 0 1px 0 rgba(255,255,255,.3);
  transition:all .2s;
}
#btnMain:active{transform:scale(.94)}
#btnMain svg{width:30px;height:30px}
#btnMain.active{
  background:rgba(20,8,8,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:2px solid var(--alert);color:var(--alert);
  box-shadow:0 0 22px rgba(255,59,59,.35);
}

/* ================= шторка настроек ================= */
#scrim{position:absolute;inset:0;z-index:19;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .3s}
#scrim.open{opacity:1;pointer-events:auto}
#sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:26px 26px 0 0;border-top:1px solid var(--stroke);
  padding:10px 22px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(110%);transition:transform .32s cubic-bezier(.32,.72,.35,1);
}
#sheet.open{transform:none}
#sheet .handle{width:38px;height:4px;border-radius:2px;background:var(--stroke);margin:4px auto 18px}
#sheet h2{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;color:var(--dim);
  text-transform:uppercase;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:16px}
.srow label{width:120px;color:var(--dim)}
.srow input[type=range]{flex:1;accent-color:var(--accent)}
.srow .val{width:34px;text-align:right;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.sheet-btns{display:flex;gap:10px;margin-top:4px}
.sbtn{
  flex:1;padding:13px;border-radius:14px;border:1px solid var(--stroke);
  background:rgba(255,255,255,.04);color:var(--ink);font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.sbtn:active{transform:scale(.97)}
.sbtn.accent{background:linear-gradient(145deg,var(--accent2),#FF4E11);border-color:transparent;color:#fff}
#zoomRow{display:none}
#btnInstall{display:none;margin-top:10px;width:100%}
#log{max-height:0;overflow:hidden;transition:max-height .3s;font-size:12px;color:var(--dim);margin-top:8px}
#log.open{max-height:130px;overflow-y:auto}
#log div{padding:4px 0;border-bottom:1px dashed var(--stroke)}
#log b{color:var(--ink)}

/* тост */
#toast{
  position:absolute;top:calc(76px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-16px);
  background:var(--glass2);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--accent);color:var(--ink);font-weight:600;font-size:13.5px;
  padding:10px 20px;border-radius:14px;opacity:0;transition:all .25s;
  pointer-events:none;white-space:nowrap;z-index:12;box-shadow:0 8px 26px rgba(0,0,0,.45);
}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* подсказка «тапни по поплавку» */
#tapHint{
  position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);z-index:8;
  display:none;flex-direction:column;align-items:center;gap:10px;pointer-events:none;
}
#tapHint .ring{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,90,31,.8);
  animation:ringPulse 1.6s ease-out infinite}
@keyframes ringPulse{0%{transform:scale(.55);opacity:1}100%{transform:scale(1.35);opacity:0}}
#tapHint span{font-size:13px;font-weight:600;color:var(--ink);
  background:var(--glass2);border:1px solid var(--stroke);border-radius:12px;padding:8px 16px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

/* ================= прогноз клёва ================= */
#fcCard{
  margin-top:20px;width:min(300px,80vw);padding:12px 16px;border-radius:16px;cursor:pointer;
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--stroke);color:var(--ink);font-family:'Inter',sans-serif;text-align:left;
  display:flex;align-items:center;gap:14px;transition:transform .15s;
}
#fcCard:active{transform:scale(.97)}
#fcCard .fc-score{font-family:'Russo One',sans-serif;font-size:24px;min-width:40px;text-align:center}
#fcCard .fc-lines{flex:1;font-size:12px;line-height:1.5;color:var(--dim)}
#fcCard .fc-lines b{color:var(--ink);font-size:13px}
#fcPanel{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:26px 26px 0 0;border-top:1px solid var(--stroke);
  padding:10px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(110%);transition:transform .32s cubic-bezier(.32,.72,.35,1);
  max-height:84dvh;overflow-y:auto;
}
#fcPanel.open{transform:none}
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.fc-top h2{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.fc-city-row{display:flex;gap:8px;margin-bottom:16px}
.fc-city-row input{flex:1;min-width:0;padding:11px 14px;border-radius:12px;border:1px solid var(--stroke);
  background:rgba(255,255,255,.05);color:var(--ink);font-size:16px;font-family:'Inter',sans-serif;outline:none}
.fc-city-row input::placeholder{color:var(--dim);font-size:13px}
.fc-city-row input:focus{border-color:rgba(255,90,31,.5)}
.fc-hero{display:flex;align-items:center;gap:18px;margin:4px 0 16px}
.fc-gauge{position:relative;width:112px;height:112px;flex:none}
.fc-gauge svg{width:100%;height:100%;transform:rotate(-90deg)}
.fc-gauge #fcArc{transition:stroke-dasharray .8s ease,stroke .4s}
.fc-gauge .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Russo One',sans-serif;font-size:28px;gap:2px}
.fc-gauge .num small{font-size:8.5px;letter-spacing:1.5px;color:var(--dim);font-family:'Inter',sans-serif;font-weight:600;
  max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-verdict{flex:1}
.fc-verdict .v{font-family:'Russo One',sans-serif;font-size:17px;margin-bottom:7px}
.fc-verdict .w{font-size:12.5px;color:var(--dim);line-height:1.55}
.fc-verdict .w b{color:var(--accent)}
.fc-facts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.ff{background:rgba(255,255,255,.04);border:1px solid var(--stroke);border-radius:12px;padding:8px 10px}
.ff .t{font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.ff .v{font-size:12px;font-weight:600;color:var(--ink)}
.ff .v .good{color:var(--teal)}
.ff .v .bad{color:var(--alert)}
#fcBars{display:flex;align-items:flex-end;gap:2px;height:54px;margin-bottom:4px}
#fcBars div{flex:1;border-radius:3px 3px 0 0;min-height:3px}
#fcBarLabels{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);margin-bottom:14px}
.fc-sun{font-size:11px;color:var(--dim);text-align:center;margin-bottom:5px}
.fc-src{font-size:9px;color:var(--dim);opacity:.55;text-align:center}

/* ================= повтор поклёвки ================= */
#replayBtn{position:absolute;right:14px;top:calc(132px + env(safe-area-inset-top));z-index:16;display:none}
#replayBtn .badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;
  background:var(--alert);color:#fff;font:700 10px/18px 'Inter',sans-serif;text-align:center;padding:0 4px}
#replayView{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;
  background:rgba(3,9,13,.97);
  padding:calc(10px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))}
#replayView.open{display:flex}
.rv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rv-top .t{font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:1.5px}
.rv-top .t small{display:block;font-family:'Inter',sans-serif;font-size:11px;color:var(--dim);
  letter-spacing:.3px;margin-top:3px;font-weight:500}
#rvCanvas{flex:1;min-height:0;width:100%;object-fit:contain;background:#000;
  border-radius:16px;border:1px solid var(--stroke)}
.rv-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin:10px 0 0;
  color:var(--dim);font-size:12px;font-weight:600}
.rv-nav button{background:none;border:none;color:var(--ink);font-size:26px;line-height:1;cursor:pointer;padding:2px 12px}
.rv-nav button:disabled{opacity:.25}
.rv-bar{position:relative;margin:4px 2px 10px}
.rv-bar input{width:100%;accent-color:var(--accent)}
#rvMark{position:absolute;top:-3px;width:3px;height:8px;border-radius:2px;background:var(--alert);pointer-events:none}
.rv-ctrl{display:flex;justify-content:center;gap:16px}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" autoplay playsinline muted style="display:none"></video>
    <canvas id="simCanvas" style="display:none"></canvas>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
    <div id="tapHint"><div class="ring"></div><span>Тапни по поплавку</span></div>
    <div id="toast"></div>
  </div>

  <div id="topbar">
    <div class="brand"><span class="bob"></span>ПОПЛАВОК</div>
    <div class="status-pill" id="status">не активен</div>
  </div>

  <button class="ibtn" id="torchBtn" aria-label="Фонарик">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4.5 14H11l-1 8L19 10h-6.5L13 2z" fill="currentColor" stroke="none"/></svg>
  </button>

  <button class="ibtn" id="replayBtn" aria-label="Повторы поклёвок">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12a8.5 8.5 0 1 0 2.6-6.1"/><path d="M6 2.5V6h3.5"/><path d="M10.5 9.3 15.5 12l-5 2.7V9.3z" fill="currentColor" stroke="none"/></svg>
    <span class="badge" id="replayCount">0</span>
  </button>

  <div id="bottom">
    <div id="tracecard">
      <div id="trace-head">
        <span>Сейсмограф <span id="calib-label"></span></span>
        <span id="trace-stats">клёв <b id="statBites">0</b> · тычки <b id="statNibbles">0</b> · <span id="statTime">00:00</span></span>
      </div>
      <canvas id="trace"></canvas>
    </div>
    <div id="dock">
      <button class="ibtn on" id="chipSound" aria-label="Звук">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6.5 8.5H3.5v7h3L11 19V5z" fill="currentColor" stroke="none"/><path d="M15.5 8.7a4.6 4.6 0 0 1 0 6.6M18.2 6a8.4 8.4 0 0 1 0 12"/></svg>
      </button>
      <button class="ibtn on" id="chipVibro" aria-label="Вибро">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="4" width="8" height="16" rx="2.2"/><path d="M4.5 9v6M19.5 9v6"/></svg>
      </button>
      <button id="btnMain" aria-label="Камера">
        <svg id="icoCam" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h1.8L10 4h4l1.7 2h1.8A2.5 2.5 0 0 1 20 8.5v8a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5v-8z"/><circle cx="12" cy="12.4" r="3.4"/></svg>
        <svg id="icoStop" viewBox="0 0 24 24" style="display:none"><rect x="7" y="7" width="10" height="10" rx="2.5" fill="currentColor"/></svg>
      </button>
      <button class="ibtn" id="chipNight" aria-label="Ночной режим">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13.2A8.2 8.2 0 1 1 10.8 4a6.6 6.6 0 0 0 9.2 9.2z"/></svg>
      </button>
      <button class="ibtn" id="btnGear" aria-label="Настройки">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/><circle cx="9.5" cy="7" r="2.3" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="2.3" fill="currentColor" stroke="none"/><circle cx="7.5" cy="17" r="2.3" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>

  <div id="welcome">
    <div class="float-big"></div>
    <div class="ripple"></div>
    <h1>ПОПЛАВОК</h1>
    <div id="welcomeMsg">ИИ-сторож поклёвки. Наведи камеру на поплавок, тапни по нему — дальше слежу я.</div>
    <button id="fcCard">
      <div class="fc-score" id="fcCardScore">–</div>

<script>
/* =========================================================
   ПОПЛАВОК — ИИ-сторож поклёвки
   Трекинг: тап по поплавку → ROI, следим за вертикальным
   центром масс яркости/цвета. Калибровка 8с → детект аномалий.
========================================================= */
const $=id=>document.getElementById(id);
const video=$('video'),sim=$('simCanvas'),overlay=$('overlay'),trace=$('trace');
const octx=overlay.getContext('2d'),tctx=trace.getContext('2d');
const statusEl=$('status'),toast=$('toast'),flash=$('flash'),welcome=$('welcome'),tapHint=$('tapHint');

let mode=null;            // 'cam' | 'demo'
let stream=null,rafId=null;
let camTrack=null;        // видеотрек для зума/фонарика
let torchOn=false;
let roi=null;
let baselineY=null;
let calibUntil=0;
let noiseStd=1;
let history=[];
let lastEventT=0;
let soundOn=true,vibroOn=true;
let sens=5;
let procCanvas=document.createElement('canvas');
let pctx=procCanvas.getContext('2d',{willReadFrequently:true});
let wakeLock=null;
let stats={bites:0,nibbles:0};
let sessionStart=0,timerInt=null;

/* ---------- аудио ---------- */
let actx=null;
function beep(freq=880,dur=0.15,times=1){
  if(!soundOn)return;
  if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
  for(let i=0;i<times;i++){
    const t=actx.currentTime+i*(dur+0.08);
    const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=freq;o.type='square';
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(0.4,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g).connect(actx.destination);o.start(t);o.stop(t+dur+0.02);
  }
}
function vibrate(pat){if(vibroOn&&navigator.vibrate)navigator.vibrate(pat)}

/* ---------- события ---------- */
function showToast(msg,color){
  toast.textContent=msg;toast.style.borderColor=color||'var(--accent)';
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>toast.classList.remove('show'),2200);
}
function logEvent(msg){
  const d=new Date(),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0'),ss=String(d.getSeconds()).padStart(2,'0');
  const el=document.createElement('div');
  el.innerHTML=`<b>${hh}:${mm}:${ss}</b> — ${msg}`;
  $('log').prepend(el);
}
function screenFlash(){
  flash.classList.add('show');
  clearTimeout(screenFlash._t);
  screenFlash._t=setTimeout(()=>flash.classList.remove('show'),600);
}
function updateStats(){
  $('statBites').textContent=stats.bites;
  $('statNibbles').textContent=stats.nibbles;
}
function fireEvent(type){
  const now=performance.now();
  if(now-lastEventT<1500)return; // антидребезг
  lastEventT=now;
  statusEl.textContent={tug:'ПОКЛЁВКА!',lift:'выложило!',nibble:'потюкивает',lost:'поплавок пропал!'}[type];
  statusEl.className='status-pill bite';
  setTimeout(()=>{if(mode){statusEl.textContent='слежу…';statusEl.className='status-pill watching'}},2500);
  if(type==='tug'){stats.bites++;screenFlash();showToast('🎣 ПОКЛЁВКА! Притопило!','var(--alert)');beep(1200,0.12,4);vibrate([200,80,200,80,400]);logEvent('поклёвка — поплавок притопило');saveReplay('tug')}
  if(type==='lift'){stats.bites++;screenFlash();showToast('⬆️ Выложило! Подсекай!','var(--alert)');beep(600,0.2,3);vibrate([300,100,300]);logEvent('подъём — поплавок выложило');saveReplay('lift')}
  if(type==='nibble'){stats.nibbles++;showToast('👀 Потюкивает…','var(--teal)');beep(880,0.08,2);vibrate([80,60,80]);logEvent('потюкивание')}
  if(type==='lost'){showToast('❓ Потерял поплавок','var(--accent)');beep(300,0.4,1);vibrate([500]);logEvent('поплавок вне зоны — проверь удочку!')}
  updateStats();
}

/* ---------- обработка кадра ---------- */
function frameSize(){
  if(mode==='cam')return{w:video.videoWidth,h:video.videoHeight};
  return{w:sim.width,h:sim.height};
}
function grabROI(){
  const{w,h}=frameSize();if(!w)return null;
  procCanvas.width=roi.w;procCanvas.height=roi.h;
  pctx.drawImage(mode==='cam'?video:sim,roi.x,roi.y,roi.w,roi.h,0,0,roi.w,roi.h);
  return pctx.getImageData(0,0,roi.w,roi.h);
}
/* центр масс "поплавочности": яркие + красно-оранжевые пиксели */
function floatCenterY(img){
  const d=img.data;let sum=0,wsum=0;
  for(let y=0;y<img.height;y++){
    let rowW=0;
    for(let x=0;x<img.width;x++){
      const i=(y*img.width+x)*4;
      const r=d[i],g=d[i+1],b=d[i+2];
      const lum=0.3*r+0.59*g+0.11*b;
      const redness=Math.max(0,r-(g+b)/2);       // оранжевая антенна
      const score=redness*2+Math.max(0,lum-140); // ярко ИЛИ красно
      rowW+=score;
    }
    sum+=rowW*y;wsum+=rowW;
  }
  if(wsum<500)return null;
  return sum/wsum;
}

/* ---------- главный цикл ---------- */
function loop(){
  rafId=requestAnimationFrame(loop);
  const{w,h}=frameSize();if(!w)return;
  if(mode==='demo')drawSim();

  overlay.width=overlay.clientWidth;overlay.height=overlay.clientHeight;
  const sx=overlay.width/w,sy=overlay.height/h;

  if(!roi){return}
  const img=grabROI();if(!img)return;
  const cy=floatCenterY(img);
  const now=performance.now();

  let dev=0;
  if(cy===null){
    if(baselineY!==null&&now>calibUntil)fireEvent('lost');
  }else{
    const absY=roi.y+cy;
    if(baselineY===null){baselineY=absY;calibUntil=now+8000;statusEl.textContent='калибровка…';statusEl.className='status-pill watching'}
    if(now>calibUntil)baselineY+=(absY-baselineY)*0.002; // дрейф: течение, ветер
    else baselineY+=(absY-baselineY)*0.02;
    dev=absY-baselineY;

    if(now<calibUntil){
      noiseStd=noiseStd*0.95+Math.abs(dev)*0.05;
      $('calib-label').textContent='· калибровка '+Math.ceil((calibUntil-now)/1000)+'с';
    }else{
      $('calib-label').textContent='· фон ±'+noiseStd.toFixed(1)+'px';
      const k=(11-sens);
      const thr=Math.max(3,noiseStd*k);
      if(dev>thr*1.6)fireEvent('tug');
      else if(dev<-thr*1.6)fireEvent('lift');
      else{
        const recent=history.slice(-20);
        if(recent.length>15){
          const osc=recent.reduce((a,v,i)=>i?a+Math.abs(v-recent[i-1]):0,0)/recent.length;
          if(osc>Math.max(1.2,noiseStd*(k*0.45)))fireEvent('nibble');
        }
      }
    }
  }
  history.push(dev);if(history.length>240)history.shift();

  // рамка ROI со свечением
  octx.save();
  octx.shadowColor='#FF5A1F';octx.shadowBlur=10;
  octx.strokeStyle='#FF5A1F';octx.lineWidth=2;octx.setLineDash([7,5]);
  octx.strokeRect(roi.x*sx,roi.y*sy,roi.w*sx,roi.h*sy);
  octx.restore();
  if(cy!==null){
    octx.save();
    octx.shadowColor='#FF5A1F';octx.shadowBlur=14;
    octx.beginPath();
    octx.arc((roi.x+roi.w/2)*sx,(roi.y+cy)*sy,6,0,7);
    octx.fillStyle='#FF5A1F';octx.fill();
    octx.strokeStyle='#fff';octx.lineWidth=1.5;octx.stroke();
    octx.restore();
  }
  drawTrace();
}

/* ---------- сейсмограф ---------- */
function drawTrace(){
  trace.width=trace.clientWidth*devicePixelRatio;
  trace.height=trace.clientHeight*devicePixelRatio;
  const W=trace.width,H=trace.height,mid=H/2;
  tctx.clearRect(0,0,W,H);
  tctx.strokeStyle='rgba(255,255,255,.08)';tctx.beginPath();tctx.moveTo(0,mid);tctx.lineTo(W,mid);tctx.stroke();
  if(history.length<2)return;
  const scale=Math.min(2.5,H/(noiseStd*12+8));
  tctx.beginPath();
  history.forEach((v,i)=>{
    const x=i/240*W,y=mid+v*scale*devicePixelRatio;
    i?tctx.lineTo(x,y):tctx.moveTo(x,y);
  });
  const hot=Math.abs(history[history.length-1])>noiseStd*3;
  tctx.shadowColor=hot?'#FF3B3B':'#2FA8A0';
  tctx.shadowBlur=8*devicePixelRatio;
  tctx.strokeStyle=hot?'#FF3B3B':'#2FA8A0';
  tctx.lineWidth=1.5*devicePixelRatio;tctx.stroke();
  tctx.shadowBlur=0;
}

/* ---------- выбор поплавка тапом ---------- */
overlay.addEventListener('pointerdown',e=>{
  if(!mode)return;
  const{w,h}=frameSize();if(!w)return;
  const r=overlay.getBoundingClientRect();
  const fx=(e.clientX-r.left)/r.width*w;
  const fy=(e.clientY-r.top)/r.height*h;
  const box=Math.round(Math.min(w,h)*0.16);
  roi={x:Math.max(0,Math.round(fx-box/2)),y:Math.max(0,Math.round(fy-box)),w:box,h:box*2};
  roi.x=Math.min(roi.x,w-roi.w);roi.y=Math.min(roi.y,h-roi.h);
  baselineY=null;noiseStd=1;history=[];
  tapHint.style.display='none';
  showToast('🎯 Поплавок захвачен, калибруюсь…');
  if(actx===null)beep(880,0.05,1); // разблокировать аудио жестом
});
overlay.addEventListener('contextmenu',e=>e.preventDefault());

/* ---------- камера ---------- */
function camBlockedHelp(){
  showToast('🚫 Камера заблокирована','var(--alert)');
  welcome.classList.remove('hide');
  $('welcomeMsg').innerHTML=`Доступ к камере выключен, поэтому запрос не появляется. Включи вручную:<br><br>
    <b>Способ 1:</b> зажми иконку «Поплавок» → «О приложении» → Разрешения → Камера → Разрешить.<br><br>
    <b>Способ 2:</b> Chrome → ⋮ → Настройки → Настройки сайтов → Камера → разблокируй этот сайт.`;
  logEvent('камера заблокирована в настройках устройства/браузера');
}
async function startCam(auto=false){
  try{
    const st=await navigator.permissions?.query({name:'camera'});
    if(st?.state==='denied'){if(!auto)camBlockedHelp();return}
  }catch(e){/* permissions API может не знать 'camera' */}
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}},audio:false});
    video.srcObject=stream;video.style.display='block';sim.style.display='none';
    await video.play();
    camTrack=stream.getVideoTracks()[0];
    setupCamExtras();
    startMode('cam');
  }catch(err){
    if(auto)return; // тихо: покажем welcome с кнопкой
    if(err.name==='NotAllowedError'||err.name==='SecurityError')camBlockedHelp();
    else if(err.name==='NotFoundError')showToast('⚠️ Камера не найдена','var(--alert)');
    else showToast('⚠️ Нет доступа к камере','var(--alert)');
    logEvent('ошибка камеры: '+err.name+' — '+err.message);
  }
}
$('btnStartCam').onclick=()=>startCam(false);

/* автозапуск камеры при открытии приложения */
window.addEventListener('load',()=>{setTimeout(()=>{if(!mode)startCam(true)},350)});

/* зум и фонарик — если камера умеет */
function setupCamExtras(){
  const caps=camTrack.getCapabilities?.()||{};
  if(caps.zoom){
    const z=$('zoom');
    z.min=caps.zoom.min;z.max=caps.zoom.max;z.step=caps.zoom.step||0.1;
    z.value=camTrack.getSettings().zoom||caps.zoom.min;
    $('zoomVal').textContent=(+z.value).toFixed(1)+'×';
    $('zoomRow').style.display='flex';
  }
  if(caps.torch)$('torchBtn').style.display='flex';
}
$('zoom').oninput=async e=>{
  const v=+e.target.value;
  $('zoomVal').textContent=v.toFixed(1)+'×';
  try{await camTrack.applyConstraints({advanced:[{zoom:v}]})}catch(err){}
};
$('torchBtn').onclick=async e=>{
  torchOn=!torchOn;
  try{await camTrack.applyConstraints({advanced:[{torch:torchOn}]})}catch(err){torchOn=false}
  $('torchBtn').classList.toggle('on',torchOn);
};

/* ---------- демо-режим (симуляция пруда) ---------- */
let simT=0,simBite=0,simFloatY=0;
function drawSim(){
  const W=sim.width=640,H=sim.height=480;
  const c=sim.getContext('2d');
  const grd=c.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#0F3040');grd.addColorStop(1,'#071820');
  c.fillStyle=grd;c.fillRect(0,0,W,H);
  simT+=0.03;
  // лунная дорожка
  const moon=c.createRadialGradient(W*0.72,40,4,W*0.72,40,60);
  moon.addColorStop(0,'rgba(220,235,240,0.7)');moon.addColorStop(1,'rgba(220,235,240,0)');
  c.fillStyle=moon;c.beginPath();c.arc(W*0.72,40,60,0,7);c.fill();
  c.fillStyle='rgba(200,225,235,0.05)';
  for(let i=0;i<10;i++)c.fillRect(W*0.72-30+Math.sin(simT*2+i)*10,110+i*35,60,3);
  // рябь
  c.strokeStyle='rgba(120,180,190,0.15)';
  for(let i=0;i<7;i++){
    c.beginPath();
    for(let x=0;x<W;x+=8)c.lineTo(x,90+i*55+Math.sin(x*0.02+simT+i)*4);
    c.stroke();
  }
  if(simBite<=0&&Math.random()<0.004){simBite=Math.random()<0.5?1:(Math.random()<0.5?2:3);simBite*=100}
  let dy=Math.sin(simT*1.7)*2.5;
  if(simBite>0){
    const phase=simBite%100;
    const kind=Math.floor(simBite/100);
    if(kind===1)dy+=Math.sin(phase*0.8)*4;
    if(kind===2)dy+=Math.min(40,(100-phase)*1.2);
    if(kind===3)dy-=Math.min(30,(100-phase));
    simBite-=1.2;
  }
  simFloatY=240+dy;
  const fx=W/2;
  c.fillStyle='#C0262D';c.fillRect(fx-4,simFloatY,8,26);
  c.fillStyle='#fff';c.fillRect(fx-3,simFloatY-6,6,8);
  c.fillStyle='#FF5A1F';c.fillRect(fx-2.5,simFloatY-26,5,22);
  c.fillStyle='rgba(255,90,31,0.25)';c.fillRect(fx-2,simFloatY+28,4,14);
}
function startDemo(){
  video.style.display='none';sim.style.display='block';
  drawSim();
  startMode('demo');
  showToast('🛋️ Демо: тапни по поплавку');
}
$('btnDemo').onclick=()=>{closeSheet();startDemo()};
$('btnDemoWelcome').onclick=startDemo;

/* ---------- таймер сессии ---------- */
function tickTimer(){
  const s=Math.floor((Date.now()-sessionStart)/1000);
  const mm=String(Math.floor(s/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');
  $('statTime').textContent=mm+':'+ss;
}

/* ---------- wake lock ---------- */
async function requestWakeLock(){
  try{wakeLock=await navigator.wakeLock?.request('screen')}catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&mode)requestWakeLock();
});

/* ---------- запуск/остановка ---------- */
function setMainBtn(active){
  $('btnMain').classList.toggle('active',active);
  $('icoCam').style.display=active?'none':'block';
  $('icoStop').style.display=active?'block':'none';
}
async function startMode(m){
  mode=m;roi=null;baselineY=null;history=[];
  welcome.classList.add('hide');
  tapHint.style.display='flex';
  statusEl.textContent='тапни по поплавку';
  statusEl.className='status-pill watching';
  setMainBtn(true);
  stats={bites:0,nibbles:0};updateStats();
  sessionStart=Date.now();$('statTime').textContent='00:00';
  clearInterval(timerInt);timerInt=setInterval(tickTimer,1000);
  if(!rafId)loop();
  repCaptureStart();
  requestWakeLock();
}
function stopAll(){
  mode=null;cancelAnimationFrame(rafId);rafId=null;
  repCaptureStop();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  camTrack=null;torchOn=false;
  $('torchBtn').style.display='none';$('torchBtn').classList.remove('on');
  $('zoomRow').style.display='none';
  video.style.display='none';sim.style.display='none';
  roi=null;history=[];
  clearInterval(timerInt);timerInt=null;
  tapHint.style.display='none';
  octx.clearRect(0,0,overlay.width,overlay.height);
  tctx.clearRect(0,0,trace.width,trace.height);
  welcome.classList.remove('hide');

/* =========================================================
   ПРОГНОЗ КЛЁВА — реальная погода (Open-Meteo, без ключа)
   + фаза луны + зорьки → оценка 0–10 по рыбацким правилам:
   стабильное давление, рябь 1–5 м/с, облачно, зорьки,
   ново/полнолуние — хорошо; шторм и скачки давления — плохо.
========================================================= */
const FC_DEFAULT={name:'Боровск',lat:55.206,lon:36.492};
let fcLoc=null,fcData=null,fcTimer=null;
try{fcLoc=JSON.parse(localStorage.getItem('fcLoc'))}catch(e){}

function moonInfo(){
  const ref=Date.UTC(2000,0,6,18,14); // новолуние 06.01.2000 18:14 UTC
  const ph=(((Date.now()-ref)/864e5/29.530588)%1+1)%1;
  const ill=Math.round((1-Math.cos(2*Math.PI*ph))/2*100);
  let name='растущая';
  if(ph<0.03||ph>0.97)name='новолуние';
  else if(Math.abs(ph-0.25)<0.03)name='1-я четверть';
  else if(Math.abs(ph-0.5)<0.03)name='полнолуние';
  else if(Math.abs(ph-0.75)<0.03)name='посл. четверть';
  else if(ph>0.5)name='убывающая';
  const dist=Math.min(ph,Math.abs(ph-0.5),1-ph); // близость к ново/полнолунию
  const bonus=dist<=0.04?10:dist<=0.1?7:dist<=0.17?5:3;
  return{ph,ill,name,bonus};
}
async function fcFetch(loc){
  const u='https://api.open-meteo.com/v1/forecast?latitude='+loc.lat+'&longitude='+loc.lon+
    '&hourly=temperature_2m,surface_pressure,wind_speed_10m,cloud_cover,precipitation'+
    '&daily=sunrise,sunset&wind_speed_unit=ms&timezone=auto&past_days=1&forecast_days=2';
  const r=await fetch(u);
  if(!r.ok)throw new Error('weather http '+r.status);
  return r.json();
}
function hourScore(h,H,sunTimes,moonBonus){
  const p=H.surface_pressure,d3=p[h]-(p[h-3]??p[h]); // тренд давления за 3ч
  let s=8;
  const ad=Math.abs(d3);
  s+=ad<=0.8?20:(d3<0&&ad<=2.5)?14:(d3>0&&ad<=2.5)?10:2;
  const w=H.wind_speed_10m[h];
  s+=(w>=1&&w<=5)?18:(w>5&&w<=8)?10:(w<1)?8:0;
  const c=H.cloud_cover[h];
  s+=(c>=25&&c<=85)?12:6;
  const pr=H.precipitation[h];
  s+=pr<=0.1?10:pr<=1?8:pr<=3?4:0;
  const t=H.temperature_2m[h];
  s+=(t>=8&&t<=24)?8:(t>=4&&t<=28)?5:2;
  const time=new Date(H.time[h]);
  const dist=Math.min(...sunTimes.map(st=>Math.abs(time-st)))/36e5;
  s+=dist<=1.5?12:6; // зорьки — золотое время
  s+=moonBonus;
  return Math.min(100,s);
}
function fcCompute(data){
  const H=data.hourly;
  const now=new Date();
  let i0=H.time.findIndex(t=>new Date(t)>=now)-1;
  if(i0<3)i0=3;
  const sunTimes=[...data.daily.sunrise.slice(1),...data.daily.sunset.slice(1)].map(t=>new Date(t));
  const moon=moonInfo();
  const hours=[];
  for(let k=0;k<24;k++){
    const h=i0+k;if(h>=H.time.length)break;
    hours.push({t:new Date(H.time[h]),score:hourScore(h,H,sunTimes,moon.bonus)});
  }
  let best=0,bi=0;
  for(let k=0;k<hours.length-1;k++){
    const v=hours[k].score+hours[k+1].score;
    if(v>best){best=v;bi=k}
  }
  return{
    hours,moon,
    cur:Math.min(10,Math.round(hours[0].score/10)),
    best:{from:hours[bi].t,to:new Date(hours[bi].t.getTime()+2*36e5),score:Math.min(10,Math.round(best/20))},
    fact:{
      p:H.surface_pressure[i0],dp:H.surface_pressure[i0]-H.surface_pressure[i0-3],
      w:H.wind_speed_10m[i0],c:H.cloud_cover[i0],pr:H.precipitation[i0],t:H.temperature_2m[i0]
    },
    sunrise:new Date(data.daily.sunrise[1]||data.daily.sunrise[0]),
    sunset:new Date(data.daily.sunset[1]||data.daily.sunset[0])
  };
}
const fmtHM=d=>String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
const verdictText=v=>v>=8?'Отличный клёв':v>=6?'Хороший клёв':v>=4?'Средний клёв':'Слабый клёв';
const scoreColor=v=>v>=8?'#3ED598':v>=6?'#2FA8A0':v>=4?'#FF9F43':'#FF3B3B';
function fcRender(){
  if(!fcData)return;
  const R=fcCompute(fcData);
  const col=scoreColor(R.cur);
  // карточка на приветствии
  $('fcCardScore').textContent=R.cur;
  $('fcCardScore').style.color=col;
  $('fcCardText').innerHTML='<b>Клёв: '+verdictText(R.cur).split(' ')[0].toLowerCase()+'</b> · '+fcLoc.name+
    '<br>лучшее окно '+fmtHM(R.best.from)+'–'+fmtHM(R.best.to);
  // панель
  $('fcNum').textContent=R.cur;$('fcNum').style.color=col;
  $('fcPlace').textContent=fcLoc.name.toUpperCase();
  $('fcArc').style.stroke=col;
  $('fcArc').setAttribute('stroke-dasharray',(R.cur/10*276).toFixed(0)+' 276');
  $('fcVerdict').textContent=verdictText(R.cur);
  $('fcVerdict').style.color=col;
  $('fcWindow').innerHTML='Лучшее окно: <b>'+fmtHM(R.best.from)+'–'+fmtHM(R.best.to)+'</b> ('+R.best.score+'/10)';
  const f=R.fact,m=R.moon;
  const dpTxt=f.dp>0.8?'↗':f.dp<-0.8?'↘':'→';
  const dpCls=Math.abs(f.dp)<=0.8?'good':Math.abs(f.dp)<=2.5?'':'bad';
  const wCls=(f.w>=1&&f.w<=5)?'good':f.w>8?'bad':'';
  $('fcFacts').innerHTML=
    '<div class="ff"><div class="t">Давление</div><div class="v">'+Math.round(f.p)+' <span class="'+dpCls+'">'+dpTxt+'</span></div></div>'+
    '<div class="ff"><div class="t">Ветер</div><div class="v"><span class="'+wCls+'">'+f.w.toFixed(1)+' м/с</span></div></div>'+
    '<div class="ff"><div class="t">Луна</div><div class="v">'+m.ill+'% '+m.name+'</div></div>'+
    '<div class="ff"><div class="t">Темп.</div><div class="v">'+Math.round(f.t)+'°C</div></div>'+
    '<div class="ff"><div class="t">Облака</div><div class="v">'+Math.round(f.c)+'%</div></div>'+
    '<div class="ff"><div class="t">Осадки</div><div class="v">'+(f.pr>0.05?f.pr.toFixed(1)+' мм':'нет')+'</div></div>';
  $('fcBars').innerHTML=R.hours.map(h=>{
    const v=h.score/10;
    return '<div style="height:'+Math.max(6,h.score)+'%;background:'+scoreColor(v)+';opacity:'+(v>=6?'.95':'.5')+'"></div>';
  }).join('');
  $('fcBarLabels').innerHTML=R.hours.filter((_,k)=>k%6===0)
    .map(h=>'<span>'+String(h.t.getHours()).padStart(2,'0')+':00</span>').join('');
  $('fcSun').textContent='восход '+fmtHM(R.sunrise)+' · закат '+fmtHM(R.sunset)+' · луна: '+m.name+', '+m.ill+'%';
}
async function fcLoad(loc,save=true){
  fcLoc=loc;
  $('fcCardText').innerHTML='<b>Прогноз клёва</b><br>загружаю '+loc.name+'…';
  try{
    fcData=await fcFetch(loc);
    if(save)localStorage.setItem('fcLoc',JSON.stringify(loc));
    localStorage.setItem('fcCache',JSON.stringify({loc,data:fcData,ts:Date.now()}));
    fcRender();
  }catch(e){
    try{ // оффлайн у воды — показываем кэш
      const c=JSON.parse(localStorage.getItem('fcCache'));
      if(c&&c.data){fcLoc=c.loc;fcData=c.data;fcRender();showToast('📡 Прогноз из кэша (офлайн)')}
      else $('fcCardText').innerHTML='<b>Прогноз клёва</b><br>нет сети — попробуй позже';
    }catch(e2){}
  }
}
async function fcSearchCity(){
  const q=$('fcCity').value.trim();if(!q)return;
  $('fcFind').textContent='…';
  try{
    const r=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=1&language=ru&format=json');
    const j=await r.json();
    if(j.results&&j.results.length){
      const g=j.results[0];
      fcLoad({name:g.name,lat:g.latitude,lon:g.longitude});
      $('fcCity').value='';$('fcCity').blur();
    }else showToast('🤷 Город не найден');
  }catch(e){showToast('⚠️ Нет сети')}
  $('fcFind').textContent='Найти';
}
$('fcFind').onclick=fcSearchCity;
$('fcCity').addEventListener('keydown',e=>{if(e.key==='Enter')fcSearchCity()});
$('fcRefresh').onclick=()=>{if(fcLoc)fcLoad(fcLoc,false)};
$('fcGeo').onclick=()=>{
  if(!navigator.geolocation)return showToast('⚠️ Геолокация недоступна');
  showToast('📍 Определяю место…');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const loc={name:'Моя точка',lat:+pos.coords.latitude.toFixed(3),lon:+pos.coords.longitude.toFixed(3)};
    try{ // обратный геокодинг: название ближайшего города
      const r=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+loc.lat+'&longitude='+loc.lon+'&localityLanguage=ru');
      const j=await r.json();
      loc.name=j.city||j.locality||loc.name;
    }catch(e){}
    fcLoad(loc);
  },()=>showToast('🚫 Геолокация запрещена'),{timeout:8000});
};

/* =========================================================
   ПОВТОР ПОКЛЁВКИ — кольцевой буфер кадров (8 fps, ~9 сек).
   При поклёвке сохраняем 5.5с ДО + 2.5с ПОСЛЕ момента.
   Просмотр: луп, замедление ½×/¼×, перемотка, шаринг клипа.
========================================================= */
const REPLAY_FPS=8,REPLAY_PRE=5500,REPLAY_POST=2500,REPLAY_KEEP=9000,REPLAY_MAX=6;
let repBuf=[],repInt=null,repPending=false,replays=[];
const repCanvas=document.createElement('canvas');
const repCtx=repCanvas.getContext('2d');

function repCaptureStart(){
  repCaptureStop();repBuf=[];
  repInt=setInterval(()=>{
    const src=mode==='cam'?video:sim;
    const w=mode==='cam'?video.videoWidth:sim.width,h=mode==='cam'?video.videoHeight:sim.height;
    if(!w)return;
    const k=Math.min(1,640/Math.max(w,h)); // не больше 640px по большей стороне
    repCanvas.width=Math.round(w*k);repCanvas.height=Math.round(h*k);
    repCtx.drawImage(src,0,0,repCanvas.width,repCanvas.height);
    repCanvas.toBlob(b=>{
      if(!b)return;
      const now=Date.now();
      repBuf.push({t:now,blob:b});
      while(repBuf.length&&repBuf[0].t<now-REPLAY_KEEP)repBuf.shift();
    },'image/jpeg',0.6);
  },Math.round(1000/REPLAY_FPS));
}
function repCaptureStop(){clearInterval(repInt);repInt=null}

function saveReplay(type){
  if(repPending)return;
  repPending=true;
  const eventT=Date.now();
  setTimeout(()=>{
    repPending=false;
    const frames=repBuf.filter(f=>f.t>=eventT-REPLAY_PRE&&f.t<=eventT+REPLAY_POST);
    if(frames.length<REPLAY_FPS)return; // мало кадров — пропускаем
    replays.push({frames:frames.slice(),eventT,
      label:(type==='tug'?'Притопило':'Выложило')+' · '+fmtHM(new Date())});
    if(replays.length>REPLAY_MAX)replays.shift();
    $('replayCount').textContent=replays.length;
    $('replayBtn').style.display='flex';
    showToast('🎬 Повтор сохранён');
    logEvent('повтор поклёвки записан ('+frames.length+' кадров)');
  },REPLAY_POST+300);
}

/* ---------- плеер повторов ---------- */
const rv={idx:0,t:0,playing:true,speed:1,raf:null,last:0,frame:-1,busy:false,seeking:false};
function rvCur(){return replays[rv.idx]}
function rvDur(){const f=rvCur().frames;return (f[f.length-1].t-f[0].t)||1}
function rvSyncUi(){
  const R=rvCur();
  $('rvSub').textContent=R.label;
  $('rvIdx').textContent=(rv.idx+1)+'/'+replays.length;
  $('rvPrev').disabled=rv.idx===0;
  $('rvNext').disabled=rv.idx===replays.length-1;
  const pct=(R.eventT-R.frames[0].t)/rvDur();
  $('rvMark').style.left=Math.min(100,Math.max(0,pct*100))+'%';
  $('rvIcoPause').style.display=rv.playing?'block':'none';
  $('rvIcoPlay').style.display=rv.playing?'none':'block';
}
function rvLoop(ts){
  rv.raf=requestAnimationFrame(rvLoop);
  if(!rv.last)rv.last=ts;
  const dt=ts-rv.last;rv.last=ts;
  if(rv.playing&&!rv.seeking){
    rv.t+=dt*rv.speed;
    if(rv.t>rvDur())rv.t=0; // луп
    $('rvSeek').value=Math.round(rv.t/rvDur()*1000);
  }
  const F=rvCur().frames,t0=F[0].t;
  let i=F.length-1;
  for(let k=0;k<F.length;k++){if(F[k].t-t0>rv.t){i=Math.max(0,k-1);break}}
  if(i!==rv.frame&&!rv.busy){
    rv.busy=true;
    createImageBitmap(F[i].blob).then(bmp=>{
      const c=$('rvCanvas');
      if(c.width!==bmp.width){c.width=bmp.width;c.height=bmp.height}
      c.getContext('2d').drawImage(bmp,0,0);
      rv.frame=i;bmp.close();rv.busy=false;
    }).catch(()=>{rv.busy=false});
  }
}
function rvOpen(idx){
  if(!replays.length)return;
  rv.idx=idx;rv.t=0;rv.playing=true;rv.speed=1;rv.frame=-1;rv.last=0;
  $('rvSpeedTxt').textContent='1×';
  $('replayView').classList.add('open');
  rvSyncUi();
  if(!rv.raf)rv.raf=requestAnimationFrame(rvLoop);
}
function rvHide(){
  $('replayView').classList.remove('open');
  cancelAnimationFrame(rv.raf);rv.raf=null;rv.last=0;
}
$('replayBtn').onclick=()=>rvOpen(replays.length-1);
$('rvClose').onclick=rvHide;
$('rvPlay').onclick=()=>{rv.playing=!rv.playing;rvSyncUi()};
$('rvSpeed').onclick=()=>{
  rv.speed=rv.speed===1?0.5:rv.speed===0.5?0.25:1;
  $('rvSpeedTxt').textContent=(rv.speed===1?'1':rv.speed===0.5?'½':'¼')+'×';
};
$('rvPrev').onclick=()=>{if(rv.idx>0){rv.idx--;rv.t=0;rv.frame=-1;rvSyncUi()}};
$('rvNext').onclick=()=>{if(rv.idx<replays.length-1){rv.idx++;rv.t=0;rv.frame=-1;rvSyncUi()}};
$('rvSeek').addEventListener('input',e=>{rv.t=+e.target.value/1000*rvDur();rv.frame=-1});
$('rvSeek').addEventListener('pointerdown',()=>rv.seeking=true);
$('rvSeek').addEventListener('pointerup',()=>rv.seeking=false);

/* ---------- экспорт клипа (WebM/MP4) и шаринг ---------- */
let rvExporting=false;
async function rvExport(){
  if(rvExporting||!replays.length)return;
  if(!('MediaRecorder' in window))return showToast('⚠️ Экспорт не поддерживается');
  const R=rvCur();rvExporting=true;
  showToast('🎬 Готовлю клип ~8 сек…');
  try{
    const first=await createImageBitmap(R.frames[0].blob);
    const c=document.createElement('canvas');c.width=first.width;c.height=first.height;
    const cx=c.getContext('2d');cx.drawImage(first,0,0);first.close();
    const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':
      MediaRecorder.isTypeSupported('video/webm')?'video/webm':
      MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':'';
    if(!mime)throw new Error('нет кодека');
    const rec=new MediaRecorder(c.captureStream(REPLAY_FPS),{mimeType:mime,videoBitsPerSecond:2.5e6});
    const chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    const done=new Promise(res=>rec.onstop=res);
    rec.start(250);
    // проигрываем кадры в реальном времени в канвас записи
    const t0=R.frames[0].t,start=performance.now();
    for(const f of R.frames){
      const wait=(f.t-t0)-(performance.now()-start);
      if(wait>0)await new Promise(r=>setTimeout(r,wait));
      const bmp=await createImageBitmap(f.blob);
      cx.drawImage(bmp,0,0);bmp.close();
    }
    await new Promise(r=>setTimeout(r,300));
    rec.stop();await done;
    const ext=mime.includes('mp4')?'mp4':'webm';
    const blob=new Blob(chunks,{type:mime});
    const file=new File([blob],'poklevka-'+fmtHM(new Date()).replace(':','-')+'.'+ext,{type:mime});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Поклёвка! 🎣'}).catch(()=>{});
    }else{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download=file.name;a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
      showToast('💾 Клип сохранён');
    }
  }catch(e){showToast('⚠️ Не удалось: '+e.message)}
  rvExporting=false;
}
$('rvShare').onclick=rvExport;
